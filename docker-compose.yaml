# CALA Analytics - Apache Airflow con soporte para Google Cloud (BigQuery)
# Entorno portable: local (Docker) y futuro Cloud Composer
# Uso: docker compose up -d  |  Primera vez: docker compose up airflow-init && docker compose up -d

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-cala-airflow:latest}
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    # Credenciales Google Cloud (BigQuery, GCS, etc.)
    GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/opt/airflow/gcp-credentials/key.json}
    # Ruta de CSVs para pipeline IA (atenciones.csv, clientes.csv)
    PIPELINE_DATOS_DIR: /opt/airflow/datos
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    # Montar carpeta de credenciales GCP (coloca aquí tu key JSON o usa Application Default)
    - ${AIRFLOW_PROJ_DIR:-.}/gcp-credentials:/opt/airflow/gcp-credentials:ro
    # Dataset para pipeline_entrenamiento_ia (atenciones.csv, clientes.csv)
    - ${AIRFLOW_PROJ_DIR:-.}/Dataset_Prueba_Tecnica_GCP_RAG:/opt/airflow/datos:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  # En Windows/Mac para acceder al host desde contenedores
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cala-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: cala-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/gcp-credentials
        if [ -f "$${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
          echo "GCP credentials found at $${GOOGLE_APPLICATION_CREDENTIALS}"
        else
          echo "Warning: GCP key not found. Copy your service account JSON to ./gcp-credentials/key.json"
        fi
        airflow db migrate
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password $${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: cala-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: cala-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: cala-airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # API FastAPI: POST /ask (RAG), GET /kpis. Documentación en http://localhost:8000/docs
  # entrypoint vacío para no heredar el de Airflow (evita "airflow uvicorn ..." y exit code 2)
  api:
    image: ${AIRFLOW_IMAGE_NAME:-cala-airflow:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cala-api
    entrypoint: []
    working_dir: /app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/app
      - ${AIRFLOW_PROJ_DIR:-.}/logs:/app/logs
      - ${AIRFLOW_PROJ_DIR:-.}/gcp-credentials:/app/gcp-credentials:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/gcp-credentials/key.json}
      BQ_PROJECT_ID: ${BQ_PROJECT_ID:-}
      BQ_DATASET_ID: ${BQ_DATASET_ID:-cala_analytics}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    restart: unless-stopped

volumes:
  postgres-db-volume:
